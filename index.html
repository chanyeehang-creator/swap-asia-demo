<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>SWAP Asia — Prototype</title>
<meta name="theme-color" content="#000000"/>
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' fill='black'/><text x='12' y='17' font-size='14' font-weight='900' font-family='-apple-system,sans-serif' text-anchor='middle' fill='white'>S</text></svg>"/>

<template id="__bundler_thumbnail">

    <rect width="200" height="200" fill="#000"/>

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body, #root { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, "Segoe UI", Roboto, Inter, sans-serif;
    font-size: 14px;
    color: #000;
    background: #F5F5F5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    -webkit-tap-highlight-color: transparent;
  }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* Phone frame becomes full-bleed on small screens */
  @media (max-width: 480px) {
    body { background: #fff; }
    .appRoot { box-shadow: none !important; }
  }
</style>

<!-- React + Babel (pinned versions per platform spec) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Load data first (plain JS) -->
  <script src="src/data.js"></script>

  <!-- Then JSX modules in dependency order -->
  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/state.jsx"></script>
  <script type="text/babel" src="src/ui.jsx"></script>
  <script type="text/babel" src="src/screens/auth.jsx"></script>
  <script type="text/babel" src="src/screens/home.jsx"></script>
  <script type="text/babel" src="src/screens/buy.jsx"></script>
  <script type="text/babel" src="src/screens/sell.jsx"></script>
  <script type="text/babel" src="src/screens/repair.jsx"></script>
  <script type="text/babel" src="src/screens/profile.jsx"></script>
  <script type="text/babel" src="src/screens/quiz.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
